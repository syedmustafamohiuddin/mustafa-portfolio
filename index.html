    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>
    <style>
        :root {
            /* Apple-inspired Tech Color Scheme */
            --bg-primary: #000000;
            --bg-secondary: #111111;
            --bg-glass: rgba(255, 255, 255, 0.03);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.75);
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent-primary: #007AFF;
            --accent-secondary: #34C759;
            --accent-gradient: linear-gradient(135deg, #007AFF 0%, #5856D6 50%, #FF9500 100%);
            --border-glass: rgba(255, 255, 255, 0.1);
            --shadow-1: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --shadow-2: 0 0 0 1px rgba(255, 255, 255, 0.05);
            --radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(var(--accent-primary), var(--accent-secondary));
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover { 
            background: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.3);
        }

        /* Navigation - Apple Style */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            z-index: 1000;
            border-bottom: 1px solid var(--border-glass);
            transition: all 0.3s ease;
        }

        nav.scrolled {
            height: 70px;
            backdrop-filter: blur(30px);
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            padding: 8px 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 50%;
            background: var(--accent-primary);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform: translateX(-50%);
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Hero Section - Apple Style */
        header {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 5% 100px;
            position: relative;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0, 122, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(52, 199, 89, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(88, 86, 214, 0.06) 0%, transparent 50%);
            z-index: -1;
        }

        .profile-container {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            margin-bottom: 40px;
            position: relative;
            padding: 6px;
            background: var(--accent-gradient);
            box-shadow: var(--shadow-1), var(--shadow-2);
        }

        .profile-container::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: var(--bg-primary);
            z-index: 1;
        }

        .profile-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            position: relative;
            z-index: 2;
            border: 4px solid var(--bg-primary);
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 24px;
            line-height: 1.1;
        }

        .about-summary {
            max-width: 700px;
            font-size: 1.25rem;
            color: var(--text-muted);
            font-weight: 400;
            line-height: 1.7;
            margin: 0 auto;
        }

        /* Sections */
        section {
            padding: 120px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 600;
            margin-bottom: 80px;
            position: relative;
            letter-spacing: -0.5px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            width: 60px;
            height: 3px;
            background: var(--accent-gradient);
            border-radius: 2px;
        }

        /* Advanced Cards */
        .card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 60px;
            margin-bottom: 40px;
            border: 1px solid var(--border-glass);
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--accent-gradient);
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }

        .card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-1), 0 0 40px rgba(0, 122, 255, 0.2);
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
            gap: 20px;
        }

        .company-info h3 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .role-title {
            color: var(--accent-primary);

            font-size: 1.125rem;
        }

        .date-location {
            color: var(--text-muted);
            font-size: 1rem;
            text-align: right;
            font-weight: 400;
        }

        .company-logo {
            height: 48px;
            filter: brightness(0) invert(1);
            opacity: 0.9;
            transition: all 0.3s ease;
        }

        .card:hover .company-logo {
            filter: brightness(1) invert(0.9);
            transform: scale(1.1);
        }

        .bullet-points {
            list-style: none;
            margin-bottom: 40px;
        }

        .bullet-points li {
            margin-bottom: 16px;
            padding-left: 32px;
            color: var(--text-secondary);
            position: relative;
            font-size: 1.05rem;
        }

        .bullet-points li::before {

            height: 8px;
            background: var(--accent-primary);
            border-radius: 50%;
        }

        /* Image Grid */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin: 40px 0;
        }

        .image-grid img {

            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);

        }

        .project-card:hover {
